<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HatCric Predictor | Live IPL 2026 Analytics</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: { "surface-dim": "#0e0e0e", "tertiary": "#ff6e81", "primary": "#8eff71", "secondary": "#00fbfb", "surface": "#0e0e0e" }
            }
          }
        }
    </script>
    <style>
        body { background-color: #0e0e0e; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .velocity-gradient { background: linear-gradient(135deg, #8eff71 0%, #2ff801 100%); }
        .glow-primary { box-shadow: 0 0 25px rgba(43, 232, 0, 0.25); }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

    <header class="bg-[#0e0e0e] flex justify-between items-center px-6 py-4 w-full border-b border-white/5">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#39FF14] text-3xl">sports_cricket</span>
            <h1 class="text-2xl font-black text-[#39FF14] tracking-tighter uppercase">HatCric</h1>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 gap-8 max-w-7xl mx-auto w-full">
        <section class="w-full flex flex-col md:flex-row gap-4 items-end justify-between bg-white/5 p-8 rounded-lg">
            <div class="w-full md:w-2/3">
                <label class="block text-secondary uppercase text-xs font-bold mb-2">Select Live T20 Match</label>
                <select id="match-selector" class="w-full bg-black border border-white/10 text-white py-4 px-6 rounded-lg outline-none focus:ring-2 focus:ring-primary appearance-none cursor-pointer">
                    <option value="mock_test">Mock Game Data</option>
                    <option value="149746">GT vs DC (Match 14)</option>
                    <option value="149743">RR vs MI (Match 13)</option>
                    <option value="149721">RCB vs CSK (Match 11)</option>
                </select>
            </div>
            <button id="predict-btn" class="velocity-gradient text-black font-black py-4 px-10 rounded-lg w-full md:w-1/3">
                PREDICT SCORE
            </button>
        </section>

        <section class="w-full grid grid-cols-1 md:grid-cols-4 gap-6 items-stretch">
            <div class="bg-white/5 p-6 rounded-lg flex flex-col justify-between h-48">
                <span class="text-xs uppercase text-gray-500 font-bold">Current Score</span>
                <div class="text-5xl font-black" id="current-score">0/0</div>
            </div>
            <div class="bg-white/5 p-6 rounded-lg flex flex-col justify-between h-48">
                <span class="text-xs uppercase text-gray-500 font-bold">Overs Bowled</span>
                <div class="text-5xl font-bold" id="current-overs">0.0</div>
            </div>
            <div class="bg-white/5 p-6 rounded-lg flex flex-col justify-between h-48">
                <span class="text-xs uppercase text-gray-500 font-bold">Current RR</span>
                <div class="text-5xl font-bold" id="current-crr">0.00</div>
            </div>
            <div class="bg-white/10 p-6 rounded-lg flex flex-col justify-between border border-primary/20 glow-primary h-48">
                <span class="text-xs uppercase text-primary font-bold" id="hero-label">Predicted Score</span>
                <div class="text-5xl font-black text-primary" id="project-score">...</div>
                <div class="text-[10px] text-primary/60 uppercase font-bold" id="hero-subtext">System Ready</div>
            </div>
        </section>

        <section class="w-full bg-white/5 p-8 rounded-lg">
            <div class="flex justify-between items-end mb-4">
                <div class="flex flex-col">
                    <span id="team-a-name" class="text-xs font-bold text-primary uppercase">TEAM A</span>
                    <span class="text-4xl font-black" id="team-a-prob">50%</span>
                </div>
                <div class="flex flex-col items-end">
                    <span id="team-b-name" class="text-xs font-bold text-secondary uppercase">TEAM B</span>
                    <span class="text-4xl font-black" id="team-b-prob">50%</span>
                </div>
            </div>
            <div class="h-4 w-full bg-white/5 rounded-full overflow-hidden flex">
                <div id="bar-a" class="h-full bg-primary transition-all duration-1000" style="width: 50%"></div>
                <div id="bar-b" class="h-full bg-secondary transition-all duration-1000" style="width: 50%"></div>
            </div>
        </section>

        <section class="w-full grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="bg-white/5 p-8 rounded-lg xl:col-span-1">
                <div class="flex items-center justify-between mb-5">
                    <span class="text-xs uppercase text-gray-500 font-bold">Wickets In Hand</span>
                    <span class="text-[10px] uppercase tracking-wide text-white/30 font-bold">Live Batting State</span>
                </div>
                <div id="wicket-dots" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-white/5 p-8 rounded-lg xl:col-span-2">
                <div class="flex items-center justify-between mb-5">
                    <span class="text-xs uppercase text-gray-500 font-bold">Batters At Crease</span>
                    <span class="text-[10px] uppercase tracking-wide text-primary/60 font-bold">Frontend Preview</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm border-collapse">
                        <thead>
                            <tr class="border-b border-white/10 text-white/35 uppercase text-[10px] tracking-wide">
                                <th class="text-left font-medium py-2">Batter</th>
                                <th class="text-right font-medium py-2">R</th>
                                <th class="text-right font-medium py-2">B</th>
                                <th class="text-right font-medium py-2">4s</th>
                                <th class="text-right font-medium py-2">6s</th>
                                <th class="text-right font-medium py-2">SR</th>
                            </tr>
                        </thead>
                        <tbody id="batters-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

<script>
    const matchSelector = document.getElementById('match-selector');
    const predictBtn = document.getElementById('predict-btn');
    const batterFallbacks = {
        mock_test: [
            { name: "Jake Fraser-McGurk", runs: 41, balls: 24, fours: 5, sixes: 2 },
            { name: "KL Rahul", runs: 36, balls: 29, fours: 3, sixes: 1 }
        ],
        "149746": [
            { name: "KL Rahul", runs: 52, balls: 31, fours: 6, sixes: 2 },
            { name: "Tristan Stubbs", runs: 21, balls: 14, fours: 1, sixes: 1 }
        ],
        "149743": [
            { name: "Sanju Samson", runs: 54, balls: 33, fours: 4, sixes: 3 },
            { name: "Riyan Parag", runs: 28, balls: 20, fours: 2, sixes: 1 }
        ],
        "149721": [
            { name: "Virat Kohli", runs: 71, balls: 48, fours: 7, sixes: 2 },
            { name: "Glenn Maxwell", runs: 22, balls: 11, fours: 1, sixes: 2 }
        ]
    };

    function getBatterFallback(matchId, battingTeam, runs, wickets) {
        const seeded = batterFallbacks[matchId];
        if (seeded) {
            return seeded;
        }

        const baseRuns = Math.max(12, Math.floor(runs * 0.34));
        return [
            {
                name: `${battingTeam || "Striker"} 1`,
                runs: baseRuns,
                balls: Math.max(10, Math.floor(baseRuns / 1.35)),
                fours: Math.max(1, Math.floor(baseRuns / 14)),
                sixes: Math.max(0, Math.floor(baseRuns / 22)),
            },
            {
                name: `${battingTeam || "Striker"} 2`,
                runs: Math.max(8, Math.floor(runs * 0.22) - wickets),
                balls: Math.max(8, Math.floor(runs / 10)),
                fours: Math.max(0, Math.floor(runs / 28)),
                sixes: Math.max(0, Math.floor(runs / 40)),
            }
        ];
    }

    function renderWicketDots(wickets) {
        const wicketDots = document.getElementById('wicket-dots');
        wicketDots.innerHTML = '';

        for (let i = 0; i < 10; i++) {
            const dot = document.createElement('div');
            const isOut = i < wickets;
            dot.className = `w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black ${
                isOut
                    ? 'bg-tertiary/20 text-tertiary border border-tertiary/40'
                    : 'bg-white/5 text-white/35 border border-white/10'
            }`;
            dot.textContent = isOut ? 'W' : String(i + 1);
            wicketDots.appendChild(dot);
        }
    }

    function renderBattersTable(batters) {
        const battersBody = document.getElementById('batters-body');
        battersBody.innerHTML = '';

        batters.slice(0, 2).forEach((batter, index) => {
            const sr = batter.balls > 0 ? ((batter.runs / batter.balls) * 100) : 0;
            const badgeClass = sr >= 150
                ? 'bg-primary/20 text-primary border border-primary/30'
                : sr >= 110
                    ? 'bg-secondary/15 text-secondary border border-secondary/25'
                    : 'bg-tertiary/15 text-tertiary border border-tertiary/25';

            const row = document.createElement('tr');
            row.className = 'border-b border-white/5';
            row.innerHTML = `
                <td class="py-3 pr-2 text-white/80 font-medium">${batter.name}${index === 0 ? ' <span class="text-primary">*</span>' : ''}</td>
                <td class="py-3 text-right font-bold">${batter.runs}</td>
                <td class="py-3 text-right font-bold">${batter.balls}</td>
                <td class="py-3 text-right font-bold">${batter.fours}</td>
                <td class="py-3 text-right font-bold">${batter.sixes}</td>
                <td class="py-3 text-right">
                    <span class="inline-flex items-center rounded-md px-2 py-1 text-[11px] font-bold ${badgeClass}">
                        ${sr.toFixed(1)}
                    </span>
                </td>
            `;
            battersBody.appendChild(row);
        });
    }

    async function fetchMatchData() {
        predictBtn.innerText = "FETCHING...";
        try {
            const response = await fetch(`http://127.0.0.1:5000/api/match/${matchSelector.value}`);
            
            if (!response.ok) {
                throw new Error(`API Error: ${response.status}`);
            }

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const runs = data.current_score || 0;
            const overs = data.overs_bowled || 0;
            const innings = data.innings || 1;
            const target = data.target || 0;
            const predictedScore = data.predicted_score || 0;
            const predictionNote = data.prediction_note || "";
            const battingTeam = data.batting_team || null;
            const batters = Array.isArray(data.batters_at_crease) && data.batters_at_crease.length > 0
                ? data.batters_at_crease
                : getBatterFallback(matchSelector.value, battingTeam || data.team_a, runs, data.wickets || 0);
            
            const trueOvers = Math.floor(overs) + ((overs % 1) * 10 / 6);
            let crr = trueOvers > 0 ? (runs / trueOvers).toFixed(2) : "0.00";

            document.getElementById('current-score').innerHTML = `${runs}<span class="text-tertiary">/${data.wickets}</span>`;
            document.getElementById('current-overs').innerText = overs;
            document.getElementById('current-crr').innerText = crr;

            const heroVal = document.getElementById('project-score');
            const heroLabel = document.getElementById('hero-label');
            const heroSub = document.getElementById('hero-subtext');

            if (data.is_complete) {
                heroLabel.innerText = "MATCH FINISHED";
                heroVal.innerText = "END";
                heroSub.innerText = data.status; 
            } else if (data.state === "Preview") {
                heroLabel.innerText = "UPCOMING MATCH";
                heroVal.innerText = "PRE";
                heroSub.innerText = data.status;
            } else if (innings === 2) {
                heroLabel.innerText = "TARGET CHASE";
                heroVal.innerText = predictedScore || target;
                heroSub.innerText = predictionNote || `${Math.max(0, target - runs)} Runs Needed`;
            } else {
                heroLabel.innerText = "PROJECTED SCORE";
                heroVal.innerText = predictedScore || Math.floor(crr * 20);
                heroSub.innerText = predictionNote || "First Innings Live";
            }

            const isLive = !data.is_complete && data.state !== "Preview";
            document.getElementById('team-a-name').innerText = data.team_a + (isLive && battingTeam === data.team_a ? " (BATTING)" : "");
            document.getElementById('team-b-name').innerText = data.team_b + (isLive && battingTeam === data.team_b ? " (BATTING)" : "");

            const pA = data.win_probability.team_a;
            const pB = data.win_probability.team_b;
            document.getElementById('team-a-prob').innerText = pA + "%";
            document.getElementById('team-b-prob').innerText = pB + "%";
            document.getElementById('bar-a').style.width = pA + "%";
            document.getElementById('bar-b').style.width = pB + "%";
            renderWicketDots(data.wickets || 0);
            renderBattersTable(batters);

            heroVal.parentElement.classList.add('scale-105');
            setTimeout(() => heroVal.parentElement.classList.remove('scale-105'), 200);

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('project-score').innerText = "ERR";
            renderWicketDots(0);
            renderBattersTable(getBatterFallback(matchSelector.value, "Batter", 0, 0));
        } finally {
            predictBtn.innerText = "MANUAL REFRESH";
        }
    }

    predictBtn.addEventListener('click', fetchMatchData);
    matchSelector.addEventListener('change', fetchMatchData);
    
    fetchMatchData();

    </script>
</body>
</html>
